  (async () => {
    const SCENARIO = 'player-two-jokers';
    // player-first | ai-first | player-joker | player-two-jokers | ai-joker

    const S = {
      'player-first': {
        me: [{c:'black',v:2},{c:'white',v:3},{c:'black',v:7},{c:'black',v:10}],
        ai: [{c:'white',v:4},{c:'black',v:5},{c:'white',v:8},{c:'black',v:11}],
        first:'me',
      },
      'ai-first': {
        me: [{c:'black',v:5},{c:'white',v:7},{c:'black',v:9},{c:'black',v:10}],
        ai: [{c:'white',v:2},{c:'black',v:3},{c:'white',v:6},{c:'black',v:8}],
        first:'ai',
      },
      'player-joker': {
        me: [{c:'black',v:3},{c:'white',v:5},{c:'black',v:9},{c:'black',v:-1,j:true}],
        ai: [{c:'white',v:2},{c:'black',v:6},{c:'white',v:8},{c:'black',v:11}],
        first:'me',
      },
      'player-two-jokers': {
        me: [{c:'black',v:-1,j:true},{c:'white',v:3},{c:'black',v:9},{c:'white',v:-1,j:true}],
        ai: [{c:'white',v:2},{c:'black',v:5},{c:'white',v:6},{c:'black',v:11}],
        first:'me',
      },
      'ai-joker': {
        me: [{c:'black',v:4},{c:'white',v:-1,j:true},{c:'black',v:9},{c:'black',v:10}],
        ai: [{c:'white',v:2},{c:'black',v:3},{c:'white',v:6},{c:'black',v:8}],
        first:'ai',
      },
    };

    const s = S[SCENARIO];
    if (!s) return console.error('未知:', SCENARIO);

    const u = await wx.cloud.callFunction({ name:'user', data:{ type:'login' } });
    const me = u.result.data.profile.openid;
    const r = await wx.cloud.callFunction({ name:'room', data:{ type:'createRoom', mode:'ai' } });

    const hands = {
      [me]: s.me.map(t => ({ color: t.c, value: t.v, isJoker: !!t.j })),
      ai_test: s.ai.map(t => ({ color: t.c, value: t.v, isJoker: !!t.j })),
    };

    const g = await wx.cloud.callFunction({
      name:'game', data:{
        type:'initGame', callerOpenid:me, roomId:r.result.data.room.roomId,
        players:[{openid:me},{openid:'ai_test',isAI:true}], mode:'ai', difficulty:'easy',
        testHands:hands,
        testFirstPlayer: s.first==='me' ? me : 'ai_test',
      },
    });
    if (!g.result.success) return console.error(g.result);

    const show = t => (t.isJoker ? 'J' : t.value) + (t.color === 'black' ? '黑' : '白');
    console.log('先手:', g.result.data.currentTurnOpenid === me ? '玩家' : 'AI',
      '| 手牌:', g.result.data.myHand.map(show).join(', '));
    wx.redirectTo({ url: `/view/pages/board/index?gameId=${g.result.data.gameId}&roomId=${r.result.data.room.roomId}` });
  })();
